<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Bingo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sarpanch:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header id="app-header">
  <h1 id="header-title">Stream Bingo</h1>
  <div class="header-sep"></div>

  <button class="btn-icon" id="btn-edit-mode" title="Alternar modo edição">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    <span id="btn-edit-label">Edit</span>
  </button>

  <button class="btn-icon" id="btn-shuffle" title="Aleatorizar células">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
    </svg>
    <span>Randomize</span>
  </button>

  <button class="btn-icon danger" id="btn-clear" title="Limpar seleções">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/>
      <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>
    <span>Clear</span>
  </button>

  <button class="btn-icon success-btn" id="btn-save-load" title="Salvar / Carregar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
      <polyline points="17 21 17 13 7 13 7 21"/>
      <polyline points="7 3 7 8 15 8"/>
    </svg>
    <span>Save</span>
  </button>

  <button class="btn-icon" id="btn-theme" title="Temas">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
      <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
      <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
      <circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/>
      <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
    </svg>
    <span>Theme</span>
  </button>
</header>

<main id="main">

  <!-- Barra de controles -->
  <div id="controls-bar">
    <label>Title:</label>
    <input type="text" id="title-input" placeholder="Bingo Name" maxlength="60" value="Nintendo Direct" />
    <div class="header-sep"></div>
    <label>Grid:</label>
    <div id="grid-size-control">
      <button id="btn-size-dec" title="Decrease Grid">−</button>
      <span id="grid-size-display">4×4</span>
      <button id="btn-size-inc" title="Increase Grid">+</button>
    </div>
  </div>

  <!-- Grid do bingo -->
  <div id="bingo-wrap">
    <div id="bingo-title-display"></div>
    <div id="bingo-grid"></div>
  </div>

</main>

<div class="modal-overlay" id="cell-edit-modal">
  <div class="modal-box">
    <h2>Edit</h2>

    <div class="modal-row">
      <label>Text</label>
      <textarea class="cell-edit-text" id="cell-edit-text" placeholder="Ex: Nintendo anuncia novo Mario..." rows="3"></textarea>
    </div>

    <div class="modal-row">
      <label>Image (paste Ctrl+V, drag or click)</label>
      <div class="img-drop-zone" id="img-drop-zone">
        <input type="file" id="img-file-input" accept="image/*" />
        <strong>📸 Soltar imagem aqui</strong>
        <p>ou clique para selecionar arquivo</p>
      </div>
      <div id="img-preview-container"></div>
      <p class="paste-hint">Dica: copie uma imagem e pressione Ctrl+V aqui!</p>
    </div>

    <div class="modal-actions">
      <button class="btn-danger-outline" id="btn-clear-cell">🗑️ Limpar célula</button>
      <button class="btn-secondary" id="btn-cancel-edit">Cancelar</button>
      <button class="btn-primary" id="btn-save-cell">Salvar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="save-load-modal">
  <div class="modal-box">
    <h2>Save / Load Bingo</h2>

    <div class="save-input-row">
      <input type="text" id="save-name-input" placeholder="Bingo Name (e.g., Nintendo Direct June)" maxlength="50" />
      <button class="btn-primary" id="btn-do-save">Save</button>
    </div>

    <label style="font-size:0.8rem;font-weight:600;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.05em;margin-bottom:6px;display:block;">
      Saved Bingos
    </label>
    <div class="saved-list" id="saved-list"></div>

    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn-secondary" id="btn-close-save-load">Fechar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="theme-modal">
  <div class="modal-box">
    <h2>Choose Theme</h2>
    <div class="theme-grid" id="theme-grid"></div>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-close-theme">Close</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h2 id="confirm-title">Confirm</h2>
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button class="btn-secondary" id="btn-confirm-no">Cancel</button>
      <button class="btn-primary" id="btn-confirm-yes">Confirm</button>
    </div>
  </div>
</div>

<div id="win-banner">
  <div class="win-box">
    <h2>BINGO!</h2>
    <p>You completed a line!</p>
  </div>
</div>

<!-- Toast de notificação -->
<div id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
